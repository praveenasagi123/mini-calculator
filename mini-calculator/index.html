<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Calculator</title>

  <style>
    /* ── Page background ── */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
    }

    /* ── Calculator shell ── */
    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 280px;
    }

    /* ── Display screen ── */
    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
    }

    /* Small expression line (e.g. "8 + 3") */
    .display .expression {
      color: #a0aec0;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    /* Big current number */
    .display .current {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Button grid ── */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* Base button style */
    button {
      padding: 18px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }

    button:active {
      transform: scale(0.93);
      opacity: 0.8;
    }

    /* Number buttons */
    .btn-num {
      background: #1a365d;
      color: #e2e8f0;
    }

    .btn-num:hover {
      background: #2a4a7f;
    }

    /* Operator buttons (+, -, *, /) */
    .btn-op {
      background: #2d6a9f;
      color: #fff;
    }

    .btn-op:hover {
      background: #3a82c4;
    }

    /* Equals button */
    .btn-eq {
      background: #e94560;
      color: #fff;
    }

    .btn-eq:hover {
      background: #ff5c7a;
    }

    /* Clear button */
    .btn-clear {
      background: #744210;
      color: #fbd38d;
      grid-column: span 2;
    }

    .btn-clear:hover {
      background: #975a16;
    }

    /* Zero button spans 2 columns */
    .btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>

<div class="calculator">

  <!-- Screen -->
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="current" id="current">0</div>
  </div>

  <!-- Buttons -->
  <div class="buttons">

    <!-- Row 1 -->
    <button class="btn-clear" onclick="clearAll()">C</button>
    <button class="btn-op"    onclick="inputOperator('/')">÷</button>
    <button class="btn-op"    onclick="inputOperator('*')">×</button>

    <!-- Row 2 -->
    <button class="btn-num" onclick="inputNumber('7')">7</button>
    <button class="btn-num" onclick="inputNumber('8')">8</button>
    <button class="btn-num" onclick="inputNumber('9')">9</button>
    <button class="btn-op"  onclick="inputOperator('-')">−</button>

    <!-- Row 3 -->
    <button class="btn-num" onclick="inputNumber('4')">4</button>
    <button class="btn-num" onclick="inputNumber('5')">5</button>
    <button class="btn-num" onclick="inputNumber('6')">6</button>
    <button class="btn-op"  onclick="inputOperator('+')">+</button>

    <!-- Row 4 -->
    <button class="btn-num" onclick="inputNumber('1')">1</button>
    <button class="btn-num" onclick="inputNumber('2')">2</button>
    <button class="btn-num" onclick="inputNumber('3')">3</button>
    <button class="btn-eq"  onclick="calculate()" style="grid-row: span 2;">=</button>

    <!-- Row 5 -->
    <button class="btn-num btn-zero" onclick="inputNumber('0')">0</button>
    <button class="btn-num"          onclick="inputDecimal()">.</button>

  </div>
</div>

<script>
  // ── State variables ──────────────────────────────────────────
  let currentNumber  = "0";   // number shown on screen
  let firstNumber    = null;  // first number in an operation
  let chosenOperator = null;  // +, -, *, or /
  let justCalculated = false; // did we just press = ?

  // ── Helper: update the screen ────────────────────────────────
  function updateDisplay() {
    document.getElementById("current").textContent = currentNumber;
  }

  function updateExpression(text) {
    document.getElementById("expression").textContent = text;
  }

  // ── Number button pressed ────────────────────────────────────
  function inputNumber(digit) {
    // If we just got an answer, start fresh
    if (justCalculated) {
      currentNumber  = digit;
      justCalculated = false;
    } else if (currentNumber === "0") {
      currentNumber = digit;          // replace the leading zero
    } else {
      currentNumber += digit;         // append the digit
    }
    updateDisplay();
  }

  // ── Decimal point ────────────────────────────────────────────
  function inputDecimal() {
    if (justCalculated) {
      currentNumber  = "0.";
      justCalculated = false;
    } else if (!currentNumber.includes(".")) {
      currentNumber += ".";
    }
    updateDisplay();
  }

  // ── Operator button pressed ──────────────────────────────────
  function inputOperator(op) {
    // If there is already a pending operation, calculate it first
    if (firstNumber !== null && !justCalculated) {
      calculate();
    }

    firstNumber    = parseFloat(currentNumber);
    chosenOperator = op;
    justCalculated = false;

    // Show a nice symbol on the expression line
    const symbols = { "+": "+", "-": "−", "*": "×", "/": "÷" };
    updateExpression(firstNumber + " " + symbols[op]);

    // Ready for the second number
    currentNumber = "0";
    updateDisplay();
  }

  // ── Equals button pressed ────────────────────────────────────
  function calculate() {
    // Nothing to calculate if we don't have both numbers and an operator
    if (firstNumber === null || chosenOperator === null) return;

    const second = parseFloat(currentNumber);
    let result;

    // Do the maths
    if (chosenOperator === "+") result = firstNumber + second;
    if (chosenOperator === "-") result = firstNumber - second;
    if (chosenOperator === "*") result = firstNumber * second;
    if (chosenOperator === "/") {
      if (second === 0) {
        // Can't divide by zero!
        updateExpression("Error");
        currentNumber = "0";
        firstNumber    = null;
        chosenOperator = null;
        updateDisplay();
        return;
      }
      result = firstNumber / second;
    }

    // Round to avoid floating-point weirdness like 0.1+0.2 = 0.30000000004
    result = Math.round(result * 1e10) / 1e10;

    // Show the full expression on the small line
    const symbols = { "+": "+", "-": "−", "*": "×", "/": "÷" };
    updateExpression(firstNumber + " " + symbols[chosenOperator] + " " + second + " =");

    // Put the result on screen
    currentNumber  = String(result);
    firstNumber    = null;
    chosenOperator = null;
    justCalculated = true;
    updateDisplay();
  }

  // ── Clear everything ─────────────────────────────────────────
  function clearAll() {
    currentNumber  = "0";
    firstNumber    = null;
    chosenOperator = null;
    justCalculated = false;
    updateDisplay();
    updateExpression("");
  }

  // ── Keyboard support ─────────────────────────────────────────
  document.addEventListener("keydown", function(e) {
    if (e.key >= "0" && e.key <= "9") inputNumber(e.key);
    if (e.key === ".")                 inputDecimal();
    if (e.key === "+")                 inputOperator("+");
    if (e.key === "-")                 inputOperator("-");
    if (e.key === "*")                 inputOperator("*");
    if (e.key === "/")  { e.preventDefault(); inputOperator("/"); }
    if (e.key === "Enter" || e.key === "=") calculate();
    if (e.key === "Escape" || e.key === "c") clearAll();
  });
</script>

</body>
</html>
